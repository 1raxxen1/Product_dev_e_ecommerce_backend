version: "3.9"

services:
  db:
    image: postgres:16
    container_name: friedcarborator_db
    restart: always
    environment:
      POSTGRES_DB: friedcarboratorDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root #test password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network


  web:
    build: ./backend
    container_name: friedcarborator_backend
    command: >
      gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings.prod
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: friedcarborator_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - app-network


volumes:
  postgres_data:
    
networks:
  app-network:


  
